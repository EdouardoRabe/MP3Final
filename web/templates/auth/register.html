{% extends 'base.html' %}

{% block title %}Inscription — Rabe Music{% endblock %}

{% block content %}
<div style="max-width:420px;margin:60px auto;padding:0 16px;">

    <div style="text-align:center;margin-bottom:36px;">
        <div class="nav-logo-icon" style="width:60px;height:60px;margin:0 auto 18px;border-radius:16px;">
            <i class="bi bi-music-note-beamed" style="font-size:1.7rem;"></i>
        </div>
        <h1 style="font-size:1.9rem;font-weight:900;letter-spacing:-1px;">Créer un compte</h1>
        <p style="color:var(--text-muted);font-size:0.85rem;margin-top:6px;">Rejoins Rabe Music.</p>
    </div>

    {% if error %}
    <div class="toast-flash" style="margin-bottom:20px;">
        <span><i class="bi bi-exclamation-triangle me-2"></i>{{ error }}</span>
    </div>
    {% endif %}

    <div class="card">
        <div class="card-body" style="padding:28px;">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Nom d'utilisateur</label>
                    <input type="text" name="username" class="form-control"
                           value="{{ username|default:'' }}" autofocus autocomplete="username">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email <span style="color:var(--text-muted);font-weight:400;">(optionnel)</span></label>
                    <input type="email" name="email" class="form-control"
                           value="{{ email|default:'' }}" autocomplete="email">
                </div>
                <div class="mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="password" class="form-control" autocomplete="new-password">
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirmer le mot de passe</label>
                    <input type="password" name="password_confirm" class="form-control" autocomplete="new-password">
                </div>
                <button type="submit" class="btn btn-primary w-100" style="padding:11px;">
                    <i class="bi bi-person-plus me-2"></i>Créer mon compte
                </button>
            </form>
        </div>
    </div>

    <p style="text-align:center;margin-top:20px;font-size:0.84rem;color:var(--text-muted);">
        Déjà un compte ?
        <a href="{% url 'login' %}" style="color:var(--accent);font-weight:600;">Se connecter</a>
    </p>

</div>
{% endblock %}
